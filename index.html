<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação Afetiva</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0B1F3A;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}
.container {
    max-width: 500px;
    padding: 20px;
}
.hidden { display: none; }
button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    background: #ffffff10;
    border: 1px solid #ffffff30;
    color: #fff;
    border-radius: 8px;
    font-size: 16px;
}
button:hover { background: #ffffff20; }
.fade { animation: fade 0.5s; }
@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const screens = [
{
title:"AVALIAÇÃO AFETIVA DE ALTO RISCO",
text:`Este questionário foi elaborado por especialistas altamente qualificados em observar duas mulheres apaixonadas tentando coexistir.<br><br>
Os resultados possuem rigor científico equivalente ao de um teste encontrado na internet às duas da manhã.<br><br>
Deseja prosseguir?`,
buttons:["Sim.","Evidentemente, minhas escolhas de vida me trouxeram até aqui."]
},
{
text:"Em um domingo qualquer, qual cenário é mais provável?",
buttons:[
"Resolver um desentendimento em cinco minutos",
"Transformar um assunto simples em uma tese de doutorado",
"Descobrir que ambas estavam certas e erradas ao mesmo tempo",
"Preferimos não comentar sem a presença dos nossos advogados"
]
},
{
text:"Qual destas demonstrações de afeto parece mais realista?",
buttons:[
"Eu trouxe chocolate",
"Chegou em casa?",
"Já comeu hoje?",
"Estou irritada com você, mas continuo querendo saber se você está bem"
]
},
{
text:"Escolha a frase que melhor representa um relacionamento adulto:",
buttons:[
"Concordar em tudo",
"Nunca discutir",
"Ser perfeitamente racional o tempo todo",
"Continuar escolhendo uma à outra, mesmo depois de descobrir que nenhuma das duas é particularmente fácil de lidar"
]
},
{
text:"Ao longo do relacionamento, vocês desenvolveram:",
buttons:[
"Memórias especiais",
"Piadas internas incompreensíveis para terceiros",
"Discussões absolutamente desnecessárias",
"Todas as alternativas anteriores"
]
},
{
text:"O que constitui uma ameaça real à estabilidade da relação?",
buttons:[
"Fome",
"Cansaço",
"Desistência.",
"Todas as anteriores."
]
},
{
title:"PROCESSANDO RESULTADOS...",
text:"Aplicando critérios duvidosos...<br>Consultando fontes questionáveis...<br>Ignorando completamente a objetividade...<br>Solicitando café à equipe responsável...<br>Revisando evidências comprometedoras...",
buttons:["Ver resultado"]
},
{
title:"RESULTADO",
text:`Após análises rigorosas e completamente confiáveis, concluímos que:<br><br>
Vocês são duas pessoas imperfeitamente compatíveis,<br><br>
estranhamente complementares<br><br>
e perigosamente importantes uma para a outra.<br><br>

Há fortes indícios de que desenvolveram:<br><br>
✓ piadas internas incompreensíveis para terceiros;<br>
✓ saudade desproporcional;<br>
✓ discussões ocasionais sobre assuntos que poderiam ter sido resolvidas com um abraço;<br>
✓ uma insistência curiosa em continuar escolhendo uma à outra.`,
buttons:["Ver observações adicionais do relatório"]
},
{
title:"OBSERVAÇÃO Nº 1",
text:"Curiosamente, os pesquisadores não conseguiram determinar o momento exato em que o extraordinário começou.<br><br>Talvez porque as coisas importantes raramente se anunciem como importantes.",
buttons:["Continuar"]
},
{
title:"OBSERVAÇÃO Nº 2",
text:"Às vezes, são as conversas aparentemente banais.<br>Os áudios longos.<br>Os domingos comuns.<br>As preocupações pequenas.<br>As despedidas temporárias.<br>Os retornos.<br>Que silenciosamente reorganizam a maneira como habitamos o mundo.",
buttons:["Continuar"]
},
{
title:"OBSERVAÇÃO FINAL",
text:"Depois de extensa análise, os pesquisadores chegaram a uma conclusão unânime:<br><br>algumas pessoas entram na nossa vida e deixam lembranças.<br><br>Outras deixam marcas.<br><br>E existem aquelas que alteram, ainda que discretamente, a forma como escutamos o mundo.",
buttons:["Deseja encerrar a análise?"]
},
{
text:"Não. Calminha aí....<br><br>Há uma última coisa que precisa ser dita.",
buttons:["Ler conclusão"]
},
{
text:`<small>De: Larissa<br>Para: Franciele</small><br><br>
Tentei pensar absurdamente no que escrever, mas me sinto nervosa em datas comemorativas. Ando pensando em tu com muita frequência e não sei nomear essa sensação. O mundo continua assim, fazendo seus ruídos, mas quando ouço tua voz, parece que passei a escutar de outro modo.<br><br>
Hoje, eu só queria agradecer por todas as portas que atravessamos juntas. O quanto quero viver contigo. E o quanto to, neste momento, sentindo saudade do teu beijo; do teu carinho... da gente. <br><br>

Eu te amo para todo sempre. Nunca esqueça disso.`,
buttons:[]
}
];

let index = 0;
const app = document.getElementById("app");

function render() {
    const s = screens[index];
    app.innerHTML = "";
    const div = document.createElement("div");
    div.classList.add("fade");

    if(s.title){
        const h = document.createElement("h2");
        h.innerText = s.title;
        div.appendChild(h);
    }

    const p = document.createElement("p");
    p.innerHTML = s.text;
    div.appendChild(p);

    if(s.buttons){
        s.buttons.forEach(b=>{
            const btn = document.createElement("button");
            btn.innerText = b;
            btn.onclick = ()=>{ index++; render(); };
            div.appendChild(btn);
        });
    }

    app.appendChild(div);
}

render();
</script>
</body>
</html>
